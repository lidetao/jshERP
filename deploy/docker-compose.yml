# =============================================
# jshERP docker-compose 全栈部署
# 启动: docker-compose up -d --build
# 停止: docker-compose down
# =============================================

version: '3.8'

services:
  redis:
    image: redis:7
    container_name: jsherp-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: jshERP-boot/Dockerfile
    container_name: jsherp-backend
    restart: always
    ports:
      - "127.0.0.1:9999:9999"
    volumes:
      - ./deploy/config/application.yml:/app/config/application.yml:ro
      - upload-data:/opt/jshERP/upload
      - export-data:/opt/jshERP/export
      - log-data:/opt/jshERP/logs
    environment:
      - DB_URL=jdbc:mysql://${DB_HOST}:3306/jsh_erp?useUnicode=true&characterEncoding=utf8&useCursorFetch=true&defaultFetchSize=500&allowMultiQueries=true&rewriteBatchedStatements=true&useSSL=true
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: jshERP-web/Dockerfile
    container_name: jsherp-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  redis-data:
  upload-data:
  export-data:
  log-data:
